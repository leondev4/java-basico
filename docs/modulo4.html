tir</span>\n} <span class=\"hljs-keyword\">while</span> (condici&#xf3;n);\n</code></pre>","children":[],"payload":{"tag":"li","lines":"77,82"}},{"content":"La condici&#xf3;n se eval&#xfa;a al final","children":[],"payload":{"tag":"li","lines":"82,83"}},{"content":"El bloque se ejecuta al menos una vez","children":[],"payload":{"tag":"li","lines":"83,85"}}],"payload":{"tag":"h2","lines":"76,77"}},{"content":"12. Diagrama de flujo del do-while","children":[{"content":"Ejecutar bloque &#x2192; Evaluar condici&#xf3;n &#x2192; True &#x2192; Volver a ejecutar bloque","children":[],"payload":{"tag":"li","lines":"86,87"}},{"content":"False &#x2192; Salir del bucle","children":[],"payload":{"tag":"li","lines":"87,89"}}],"payload":{"tag":"h2","lines":"85,86"}},{"content":"13. Ejemplo de do-while","children":[{"content":"\n<pre data-lines=\"90,97\"><code data-lines=\"90,97\"><span class=\"hljs-type\">int</span> i = <span class=\"hljs-number\">0</span>;\n<span class=\"hljs-keyword\">do</span> {\n    <span class=\"hljs-keyword\">System</span>.<span class=\"hljs-keyword\">out</span>.println(i);\n    i++;\n} <span class=\"hljs-keyword\">while</span> (i &lt; <span class=\"hljs-number\">5</span>);\n</code></pre>","children":[],"payload":{"tag":"li","lines":"90,97"}},{"content":"Imprime: 0,1,2,3,4","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"Si <code>i = 10</code> al inicio, imprime 10 una sola vez","children":[],"payload":{"tag":"li","lines":"98,100"}}],"payload":{"tag":"h2","lines":"89,90"}},{"content":"14. Diferencia entre while y do-while","children":[{"content":"while:","children":[{"content":"0 o m&#xe1;s iteraciones","children":[],"payload":{"tag":"li","lines":"102,103"}},{"content":"Eval&#xfa;a al inicio","children":[],"payload":{"tag":"li","lines":"103,104"}},{"content":"Puede no ejecutarse nunca","children":[],"payload":{"tag":"li","lines":"104,105"}}],"payload":{"tag":"li","lines":"101,105"}},{"content":"do-while:","children":[{"content":"1 o m&#xe1;s ucle","children":[],"payload":{"tag":"li","lines":"144,145"}},{"content":"Preferir <code>for</code> cuando se conoce el n&#xfa;mero exacto de iteraciones","children":[],"payload":{"tag":"li","lines":"145,146"}},{"content":"Preferir <code>while</code> cuando se desconoce el n&#xfa;mero de iteraciones","children":[],"payload":{"tag":"li","lines":"146,148"}}],"payload":{"tag":"h2","lines":"141,142"}},{"content":"19. Resumen del m&#xf3;dulo","children":[{"content":"<code>for</code> &#x2192; iteraciones con n&#xfa;mero fijo conocido","children":[{"content":"Sintaxis: <code>for (inicializaci&#xf3;n; condici&#xf3;n; incremento) { }</code>","children":[],"payload":{"tag":"li","lines":"150,151"}}],"payload":{"tag":"li","lines":"149,151"}},{"content":"<code>while</code> &#x2192; iteraci&#xf3;n con condici&#xf3;n al inicio (0 o m&#xe1;s veces)","children":[{"content":"Sintaxis: <code>while (condici&#xf3;n) { }</code>","children":[],"payload":{"tag":"li","lines":"152,153"}}],"payload":{"tag":"li","lines":"151,153"}},{"content":"<code>do-while</code> &#x2192; iteraci&#xf3;n con condici&#xf3;n al final (1 o m&#xe1;s veces)","children":[{"content":"Sintaxis: <code>do { } while (condici&#xf3;n);</code>","children":[],"payload":{"tag":"li","lines":"154,155"}}],"payload":{"tag":"li","lines":"153,155"}},{"content":"<code>break</code> &#x2192; sale inmediatamente del bucle","children":[],"payload":{"tag":"li","lines":"155,156"}},{"content":"<code>continue</code> &#x2192; salta a la siguiente iteraci&#xf3;n","children":[],"payload":{"tag":"li","lines":"156,157"}},{"content":"Bucles anidados &#x2192; un bucle dentro de otro bucle","children":[],"payload":{"tag":"li","lines":"157,159"}}],"payload":{"tag":"h2","lines":"148,149"}},{"content":"20. Actividad pr&#xe1;ctica","children":[{"content":"Enunciado: Crear un programa que imprima la tabla de multiplicar de un n&#xfa;mero ingresado por el usuario","children":[],"payload":{"tag":"li","lines":"160,161"}},{"content":"Tipo a usar: <code>int
