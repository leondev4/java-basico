ot;Rex&quot;</span><span class=\"hljs-comment\">;</span>\nmiPerro.edad <span class=\"hljs-operator\">=</span> <span class=\"hljs-number\">3</span><span class=\"hljs-comment\">;</span>\nmiPerro.ladrar()<span class=\"hljs-comment\">;</span>\n</code></pre>","children":[],"payload":{"tag":"li","lines":"79,85"}},{"content":"<code>new</code> reserva memoria y llama al constructor","children":[],"payload":{"tag":"li","lines":"85,87"}}],"payload":{"tag":"h2","lines":"78,79"}},{"content":"10. El constructor (prop&#xf3;sito y sintaxis)","children":[{"content":"M&#xe9;todo especial que se ejecuta al crear un objeto (<code>new</code>)","children":[],"payload":{"tag":"li","lines":"88,89"}},{"content":"Tiene el mismo nombre que la clase","children":[],"payload":{"tag":"li","lines":"89,90"}},{"content":"No tiene tipo de retorno (ni <code>void</code>)","children":[],"payload":{"tag":"li","lines":"90,91"}},{"content":"Sirve para inicializar los atributos","children":[],"payload":{"tag":"li","lines":"91,92"}},{"content":"\n<pre data-lines=\"92,101\"><code data-lines=\"92,101\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Perro</span> {\n    <span class=\"hljs-type\">String</span> nombre;\n    \n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-title\">Perro</span><span class=\"hljs-params\">(<span class=\"hljs-type\">String</span> nombre)</span> </span>{\n        <span class=\"hljs-keyword\">this</span>.nombre = nombre;\n    }\n}\n</code></pre>","children":[],"payload":{"tag":"li","lines":"92,102"}}],"payload":{"tag":"h2","lines":"87,88"}},{"content":"11. Constructor por defecto y parametrizado","children":[{"content":"\n<pre data-lines=\"103,121\"><code data-lines=\"103,121\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Persona</span> {\n    <span class=\"hljs-type\">String</span> nombre;\n    <span class=\"hljs-type\">int</span> edad;\n    \n    <span class=\"hljs-comment\">// Constructor por defecto</span>\n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-title\">Persona</span><span class=\"hljs-params\">()</span> </span>{\n        nombre = <span class=\"hljs-string\">&quot;Sin nombre&quot;</span>;\n        edad = <span class=\"hljs-number\">0</span>;\n    }\n    \n    <span class=\"hljs-comment\">// Constructor parametrizado</span>\n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-title\">Persona</span><span class=\"hljs-params\">(<span class=\"hljs-type\">String</span> nombre, <span class=\"hljs-type\">int</span> edad)</span> </span>{\n        <span class=\"hljs-keyword\">this</span>.nombre = nombre;\n        <span class=\"hljs-keyword\">this</span>.edad = edad;\n    }\n}\n</code></pre>","children":[],"payload":{"tag":"li","lines":"103,121"}},{"content":"Si no escribes ning&#xfa;n constructor, Java proporciona uno por defecto vac&#xed;o","children":[],"payload":{"tag":"li","lines":"121,122"}},{"content":"Puedes tener m&#xfa;ltiples constructores (sobrecarga)","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"h2","lines":"102,103"}},{"content":"12. Acceso a atributos y m&#xe9;todos (operador punto)","children":[{"content":"\n<pre data-lines=\"125,135\"><code data-lines=\"125,135\"><span class=\"hljs-type\">Persona</span> <span class=\"hljs-variable\">p1</span> <span class=\"hljs-operator\">=</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Persona</span>(<span class=\"hljs-string\">&quot;Ana&quot;</span>, <span class=\"hljs-number\">25</span>);\n<span class=\"hljs-type\">Persona</span> <span class=\"hljs-variable\">p2</span> <span class=\"hljs-operator\">=</span> <span class=\"hljs-keyword\">new</span> <span class=\"hljs-title class_\">Persona</span>();\n\nSystem.out.println(p1.nombre);  <span class=\"hljs-comment\">// Ana</span>\np1.edad = <span class=\"hljs-number\">26</span>;                   <span class=\"hljs-comment\">// modificar</span>\n\np2.nombre = <span class=\"hljs-string\">&quot;Luis&quot;</span>;\np2.edad = <span class=\"hljs-number\">30</span>;\n</code></pre>","children":[],"payload":{"tag":"li","lines":"125,136"}}],"payload":{"tag":"h2","lines":"124,125"}},{"content":"13. Encapsulamiento &#x2013; modificador private","children":[{"content":"Los atributos deber&#xed;an ser <code>private</code> (no accesibles desde fuera de la clase)","children":[],"payload":{"tag":"li","lines":"137,138"}},{"content":"Protege los datos de modificaciones incorrectas","children":[],"payload":{"tag":"li","lines":"138,139"}},{"content":"\n<pre data-lines=\"139,149\"><code data-lines=\"139,149\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Persona</span> {\n    <span class=\"hljs-keyword\">private</span> <span class=\"hljs-type\">String</span> nombre;\n    <span class=\"hljs-keyword\">private</span> <span class=\"hljs-type\">int</span> edad;\n}\n\n<span class=\"hljs-comment\">// Esto dar&#xed;a ERROR:</span>\nPersona p = <span class=\"hljs-keyword\">new</span> <span class=\"hljs-built_in\">Persona</span>();\np.nombre = <span class=\"hljs-string\">&quot;Ana&quot;</span>;  <span class=\"hljs-comment\">// Error: nombre es private</span>\n</code></pre>","children":[],"payload":{"tag":"li","lines":"139,150"}}],"payload":{"tag":"h2","lines":"136,137"}},{"content":"14. M&#xe9;todos getters y setters","children":[{"content":"<strong>Getter:</strong> m&#xe9;todo p&#xfa;blico que devuelve el valor de un atributo privado","children":[],"payload":{"tag":"li","lines":"151,152"}},{"content":"<strong>Setter:</strong> m&#xe9;todo p&#xfa;blico que modifica el valor de un atributo privado (puede incluir validaciones)","children":[],"payload":{"tag":"li","lines":"152,153"}},{"content":"\n<pre data-lines=\"153,179\"><code data-lines=\"153,179\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title class_\">Persona</span> {\n    <span class=\"hljs-keyword\">private</span> <span class=\"hljs-title class_\">String</span> nombre;\n    <span class=\"hljs-keyword\">private</span> int edad;\n    \n    <span class=\"hljs-comment\">// Getter</span>\n    <span class=\"hljs-keyword\">public</span> <span class=\"hljs-title class_\">String</span> <span class=\"hljs-title function_\">getNombre</span>(<span class=\"hljs-params\"></span>) {\n        <span class=\"hljs-keyword\">return</span> nombre;\n    }\n    \n    <span class=\"hljs-comment\">// Setter</span>\n    <span class=\"hljs-keyword\">public</span> <span class=\"hljs-built_in\">void</span> <span class=\"hljs-title function_\">setNombre</span>(<span class=\"hljs-params\"><span class=\"hljs-title class_\">String</span> nombre</span>) {\n        <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">nombre</span> = nombre;\n    }\n    \n    <span class=\"hljs-keyword\">public</span> int <span class=\"hljs-title function_\">getEdad</span>(<span class=\"hljs-params\"></span>) {\n        <span class=\"hljs-keyword\">return</span> edad;\n    }\n    \n    <span class=\"hljs-keyword\">public</span> <span class=\"hljs-built_in\">void</span> <span class=\"hljs-title function_\">setEdad</span>(<span class=\"hljs-params\">int edad</span>) {\n        <span class=\"hljs-keyword\">if</span> (edad &gt;= <span class=\"hljs-number\">0</span>) {\n            <span class=\"hljs-variable language_\">this</span>.<span class=\"hljs-property\">edad</span> = edad;\n        }\n    }\n}\n</code></pre>","children":[],"payload":{"tag":"li","lines":"153,180"}}],"payload":{"tag":"h2","lines":"150,151"}},{"content":"15. Beneficios del encapsulamiento","children":[{"content":"<strong>Control:</strong> se puede validar antes de modificar (ej: edad no negativa)","children":[],"payload":{"tag":"li","lines":"181,182"}},{"content":"<strong>Ocultamiento:</strong> los detalles internos no son visibles","children":[],"payload":{"tag":"li","lines":"182,183"}},{"content":"<strong>Mantenibilidad:</strong> se puede cambiar la implementaci&#xf3;n interna sin afectar a quien usa la clase","children":[],"payload":{"tag":"li","lines":"183,184"}},{"content":"<strong>Seguridad:</strong> se evitan modificaciones accidentales","children":[],"payload":{"tag":"li","lines":"184,186"}}],"payload":{"tag":"h2","lines":"180,181"}},{"content":"16. Ejemplo completo de clase con encapsulamiento","children":[{"content":"\n<pre data-lines=\"187,231\"><code data-lines=\"187,231\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">class</span> <span class=\"hljs-title\">CuentaBancaria</span> {\n    <span class=\"hljs-keyword\">private</span> String numeroCuenta;\n    <span class=\"hljs-keyword\">private</span> <span class=\"hljs-built_in\">double</span> saldo;\n    \n    <span class=\"hljs-comment\">// Constructor</span>\n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-title\">CuentaBancaria</span>(<span class=\"hljs-params\">String numeroCuenta, <span class=\"hljs-built_in\">double</span> saldoInicial</span>)</span> {\n        <span class=\"hljs-keyword\">this</span>.numeroCuenta = numeroCuenta;\n        <span class=\"hljs-keyword\">if</span> (saldoInicial &gt;= <span class=\"hljs-number\">0</span>) {\n            <span class=\"hljs-keyword\">this</span>.saldo = saldoInicial;\n        } <span class=\"hljs-keyword\">else</span> {\n            <span class=\"hljs-keyword\">this</span>.saldo = <span class=\"hljs-number\">0</span>;\n        }\n    }\n    \n    <span class=\"hljs-comment\">// Getters</span>\n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> String <span class=\"hljs-title\">getNumeroCuenta</span>()</span> {\n        <span class=\"hljs-keyword\">return</span> numeroCuenta;\n    }\n    \n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-built_in\">double</span> <span class=\"hljs-title\">getSaldo</span>()</span> {\n        <span class=\"hljs-keyword\">return</span> saldo;\n    }\n    \n    <span class=\"hljs-comment\">// M&#xe9;todos de negocio</span>\n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">void</span> <span class=\"hljs-title\">depositar</span>(<span class=\"hljs-params\"><span class=\"hljs-built_in\">double</span> monto</span>)</span> {\n        <span class=\"hljs-keyword\">if</span> (monto &gt; <span class=\"hljs-number\">0</span>) {\n            saldo += monto;\n            System.<span class=\"hljs-keyword\">out</span>.println(<span class=\"hljs-string\">&quot;Dep&#xf3;sito exitoso. Nuevo saldo: &quot;</span> + saldo);\n        } <span class=\"hljs-keyword\">else</span> {\n            System.<span class=\"hljs-keyword\">out</span>.println(<span class=\"hljs-string\">&quot;El monto debe ser positivo&quot;</span>);\n        }\n    }\n    \n    <span class=\"hljs-function\"><span class=\"hljs-keyword\">public</span> <span class=\"hljs-keyword\">void</span> <span class=\"hljs-title\">retirar</span>(<span class=\"hljs-params\"><span class=\"hljs-built_in\">double</span> monto</span>)</span> {\n        <span class=\"hljs-keyword\">if</span> (monto &gt; <span class=\"hljs-number\">0</span> &amp;&amp; monto &lt;= saldo) {\n            saldo -= monto;\n            System.<span class=\"hljs-keyword\">out</span>.println(<span class=\"hljs-string\">&quot;Retiro exitoso. Nuevo saldo: &quot;</span> + saldo);\n        } <span class=\"hljs-keyword\">else</span> {\n            System.<span class=\"hljs-keyword\">out</span>.println(<span class=\"hljs-string\">&quot;Monto inv&#xe1;lido o saldo insuficiente&quot;</span>);\n        }\n    }\n}\n</code></pre>","children":[],"payload":{"tag":"li","lines":"187,232"}}],"payload":{"tag":"h2","li
