>int[] numeros = {10, 20, 30, 40, 50};</code>","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"Con <code>new</code>: <code>String[] dias = new String[]{&quot;Lun&quot;, &quot;Mar&quot;, &quot;Mi&#xe9;&quot;};</code>","children":[],"payload":{"tag":"li","lines":"29,30"}},{"content":"Valores por defecto: <code>int</code> &#x2192; <code>0</code>, <code>double</code> &#x2192; <code>0.0</code>, <code>boolean</code> &#x2192; <code>false</code>, <code>String</code> &#x2192; <code>null</code>","children":[],"payload":{"tag":"li","lines":"30,32"}}],"payload":{"tag":"h2","lines":"26,27"}},{"content":"6. Acceso a elementos (&#xed;ndices)","children":[{"content":"\n<pre data-lines=\"33,40\"><code data-lines=\"33,40\"><span class=\"hljs-attribute\">int</span>[] numeros = {<span class=\"hljs-number\">10</span>, <span class=\"hljs-number\">20</span>, <span class=\"hljs-number\">30</span>, <span class=\"hljs-number\">40</span>, <span class=\"hljs-number\">50</span>};\n<span class=\"hljs-attribute\">System</span>.out.println(numeros[<span class=\"hljs-number\">0</span>]);  // <span class=\"hljs-number\">10</span> (primer elemento)\n<span class=\"hljs-attribute\">System</span>.out.println(numeros[<span class=\"hljs-number\">2</span>]);  // <span class=\"hljs-number\">30</span> (tercer elemento)\n<span class=\"hljs-attribute\">numeros</span>[<span class=\"hljs-number\">1</span>] = <span class=\"hljs-number\">99</span>;  // modifica el segundo elemento\n<span class=\"hljs-attribute\">System</span>.out.println(numeros[<span class=\"hljs-number\">1</span>]);  // <span class=\"hljs-number\">99</span>\n</code></pre>","children":[],"payload":{"tag":"li","lines":"33,40"}},{"content":"Los &#xed;ndices van desde <code>0</code> hasta <code>length - 1</code>","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"Acceder a un &#xed;ndice fuera de rango produce error: <code>ArrayIndexOutOfBoundsException</code>","children":[],"payload":{"tag":"li","lines":"41,43"}}]," yword\">System</span>.<span class=\"hljs-keyword\">out</span>.println(valor);\n}\n</code></pre>","children":[],"payload":{"tag":"li","lines":"58,64"}},{"content":"M&#xe1;s simple y legible","children":[],"payload":{"tag":"li","lines":"64,65"}},{"content":"No se tiene acceso al &#xed;ndice","children":[],"payload":{"tag":"li","lines":"65,66"}},{"content":"No se puede modificar el array (solo lectura)","children":[],"payload":{"tag":"li","lines":"66,68"}}],"payload":{"tag":"h2","lines":"57,58"}},{"content":"10. Ejemplo pr&#xe1;ctico con arrays","children":[{"content":"\n<pre data-lines=\"69,84\"><code data-lines=\"69,84\"><span class=\"hljs-type\">int</span>[] numeros = {<span class=\"hljs-number\">5</span>, <span class=\"hljs-number\">12</span>, <span class=\"hljs-number\">8</span>, <span class=\"hljs-number\">23</span>, <span class=\"hljs-number\">16</span>};\n<span class=\"hljs-type\">int</span> suma = <span class=\"hljs-number\">0</span>;\n<span class=\"hljs-type\">int</span> maximo = numeros[<span class=\"hljs-number\">0</span>];\n<span class=\"hljs-keyword\">for</span> (<span class=\"hljs-type\">int</span> i = <span class=\"hljs-number\">0</span>; i &lt; numeros.length; i++) {\n    suma += numeros[i];\n    <span class=\"hljs-keyword\">if</span> (numeros[i] &gt; maximo) {\n        maximo = numeros[i];\n    }\n}\n<span class=\"hljs-type\">double</span> promedio = (<span class=\"hljs-type\">double</span>) suma / numeros.length;\n<span class=\"hljs-keyword\">System</span>.<span class=\"hljs-keyword\">out</span>.println(&quot;Suma: &quot; + suma);\n<span class=\"hljs-keyword\">System</span>.<span class=\"hljs-keyword\">out</span>.println(&quot;Promedio: &quot; + promedio);\n<span class=\"hljs-keyword\">System</span>.<span class=\"hljs-keyword\">out</span>.println(&quot;M&#xe1;ximo: &quot; + maximo);\n</code></pre>","children":[],"payload":{"tag":"li","lines":"69,85"}}],"payload":{"tag":"h2","lines":"68,69"}},{"content":"11. Errores comunes con arrays","children":[{"c li","lines":"104,105"}},{"content":"Diferente a la propiedad <code>length</code> de arrays","children":[],"payload":{"tag":"li","lines":"105,107"}}],"payload":{"tag":"h2","lines":"99,100"}},{"content":"14. M&#xe9;todo charAt()","children":[{"content":"\n<pre data-lines=\"108,113\"><code data-lines=\"108,113\">String texto <span class=\"hljs-operator\">=</span> <span class=\"hljs-string\">&quot;Java&quot;</span><span class=\"hljs-comment\">;</span>\nchar letra <span class=\"hljs-operator\">=</span> texto.charAt(<span class=\"hljs-number\">0</span>)<span class=\"hljs-comment\">;  // &apos;J&apos;</span>\nchar letra2 <span class=\"hljs-operator\">=</span> texto.charAt(<span class=\"hljs-number\">2</span>)<span class=\"hljs-comment\">; // &apos;v&apos;</span>\n</code></pre>","children":[],"payload":{"tag":"li","lines":"108,113"}},{"content":"Devuelve el car&#xe1;cter en una posici&#xf3;n espec&#xed;fica","children":[],"payload":{"tag":"li","lines":"113,114"}},{"content":"&#xcd;ndices desde <code>0</code> hasta <code>length() - 1</code>","children":[],"payload":{"tag":"li","lines":"114,116"}}],"payload":{"tag":"h2","lines":"107,108"}},{"content":"15. M&#xe9;todo substring()","children":[{"content":"\n<pre data-lines=\"117,122\"><code data-lines=\"117,122\"><span class=\"hljs-attribute\">String</span> texto = <span class=\"hljs-string\">&quot;Programaci&#xf3;n&quot;</span>;\n<span class=\"hljs-attribute\">String</span> sub1 = texto.substring(<span class=\"hljs-number\">0</span>, <span class=\"hljs-number\">4</span>);   // <span class=\"hljs-string\">&quot;Prog&quot;</span>\n<span class=\"hljs-attribute\">String</span> sub2 = texto.substring(<span class=\"hljs-number\">4</span>);      // <span class=\"hljs-string\">&quot;ramaci&#xf3;n&quot;</span>\n</code></pre>","children":[],"payload":{"tag":"li","lines":"117,122"}},{"content":"<code>substring(inicio)</code> &#x2192; desde <code>inicio</code> hasta el final","children":[],"payload":{"tag":"li","lines":"122,123"}},{"conte
